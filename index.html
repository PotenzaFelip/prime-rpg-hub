<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RPG Dice Roller</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; }
        
        /* Menu de Dados Inferior */
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: rgba(0,0,0,0.95); padding: 18px; border-radius: 15px; z-index: 100; border: 1px solid #444; box-shadow: 0 0 25px rgba(0,0,0,0.7); }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; background: #2a2a2a; transition: all 0.2s ease; min-width: 65px; font-size: 14px; }
        button:hover { background: #444; transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        
        /* Cores dos Dados */
        .d4 { border-bottom: 4px solid #e74c3c; } .d6 { border-bottom: 4px solid #e67e22; } .d8 { border-bottom: 4px solid #f1c40f; }
        .d10 { border-bottom: 4px solid #9b59b6; } .d12 { border-bottom: 4px solid #2ecc71; } .d20 { border-bottom: 4px solid #3498db; }

        /* Painel do Histórico */
        #side-panel { position: absolute; top: 20px; left: 20px; width: 300px; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
        #chat { max-height: 500px; background: rgba(0,0,0,0.85); border: 1px solid #333; border-radius: 12px; padding: 15px; overflow-y: auto; box-shadow: 5px 5px 20px rgba(0,0,0,0.6); }
        #chat h3 { margin: 0 0 12px 0; font-size: 13px; color: #00ff00; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .btn-clear-chat { background: #1a1a1a; font-size: 11px; padding: 8px 12px; min-width: auto; align-self: flex-start; color: #eee; border: 1px solid #c0392b; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn-clear-chat:hover { background: #c0392b; color: white; }

        .sum-entry { background: rgba(46, 204, 113, 0.1); border-left: 5px solid #2ecc71; padding: 12px; margin-bottom: 12px; border-radius: 6px; animation: slideIn 0.3s ease; }
        .sum-entry strong { font-size: 22px; color: #2ecc71; display: block; }
        .formula { color: #aaa; font-size: 13px; margin-top: 6px; font-family: monospace; display: block; }

        /* MENU HAMBÚRGUER E CONFIGS */
        #menu-btn { position: absolute; top: 20px; right: 20px; z-index: 1000; background: #222; border: 1px solid #444; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 20px; transition: 0.3s; }
        #menu-btn:hover { background: #333; border-color: #3498db; }
        #config-panel { position: absolute; top: 70px; right: 20px; width: 250px; background: rgba(15,15,15,0.98); border: 1px solid #444; border-radius: 12px; padding: 20px; z-index: 999; display: none; box-shadow: -5px 5px 20px rgba(0,0,0,0.8); }
        .config-group { margin-bottom: 18px; }
        .config-group label { display: block; font-size: 11px; color: #3498db; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .config-group input { width: 100%; cursor: pointer; height: 4px; border-radius: 5px; background: #333; outline: none; -webkit-appearance: none; }
        .config-group input::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #3498db; border-radius: 50%; cursor: pointer; }
        .config-val { float: right; color: #fff; font-weight: bold; font-family: monospace; }
        .btn-reset { width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; margin-top: 5px; transition: 0.2s; }
        .btn-reset:hover { background: #e74c3c; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="menu-btn" onclick="toggleConfig()">☰</div>

    <div id="config-panel">
        <h4 style="margin:0 0 20px 0; color: #fff; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 10px;">CONFIGURAÇÕES FÍSICAS</h4>
        <div class="config-group">
            <label>Gravidade <span id="v-grav" class="config-val">-85</span></label>
            <input type="range" id="grav" min="-200" max="-10" value="-85">
        </div>
        <div class="config-group">
            <label>Impulso <span id="v-force" class="config-val">30</span></label>
            <input type="range" id="force" min="10" max="100" value="30">
        </div>
        <div class="config-group">
            <label>Giro (Damping) <span id="v-damp" class="config-val">0.7</span></label>
            <input type="range" id="damp" min="0" max="1" step="0.1" value="0.7">
        </div>
        <div class="config-group">
            <label>Sensib. Parada <span id="v-stop" class="config-val">0.4</span></label>
            <input type="range" id="stop" min="0.1" max="2" step="0.1" value="0.4">
        </div>
        <button class="btn-reset" onclick="resetPhysics()">RESETAR PADRÃO ⚙️</button>
    </div>

    <div id="side-panel">
        <button class="btn-clear-chat" onclick="clearLog()">LIMPAR CHAT 🗑️</button>
        <div id="chat">
            <h3>Histórico de Rolagens</h3>
            <div id="log"></div>
        </div>
    </div>

    <div id="ui">
        <button class="d4" onclick="rollDice('d4')">d4</button>
        <button class="d6" onclick="rollDice('d6')">d6</button>
        <button class="d8" onclick="rollDice('d8')">d8</button>
        <button class="d10" onclick="rollDice('d10')">d10</button>
        <button class="d12" onclick="rollDice('d12')">d12</button>
        <button class="d20" onclick="rollDice('d20')">d20</button>
        <div style="width: 2px; background: #444; margin: 0 10px;"></div>
        <button style="background: #27ae60;" onclick="rollAll()">ROLAR MESA</button>
        <button style="background: #555;" onclick="clearTable()">LIMPAR MESA</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, world, controls, dice = [];
        let needsSum = false;

        // Padrões originais
        const DEFAULTS = { grav: -85, force: 30, damp: 0.7, stop: 0.4 };
        let cfg = { ...DEFAULTS };

        function toggleConfig() {
            const p = document.getElementById('config-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function updateUIValues() {
            document.getElementById('v-grav').innerText = cfg.grav;
            document.getElementById('v-force').innerText = cfg.force;
            document.getElementById('v-damp').innerText = cfg.damp;
            document.getElementById('v-stop').innerText = cfg.stop;
            
            document.getElementById('grav').value = cfg.grav;
            document.getElementById('force').value = cfg.force;
            document.getElementById('damp').value = cfg.damp;
            document.getElementById('stop').value = cfg.stop;
        }

        function resetPhysics() {
            cfg = { ...DEFAULTS };
            world.gravity.set(0, cfg.grav, 0);
            updateUIValues();
        }

        // Listeners para sliders
        document.getElementById('grav').addEventListener('input', (e) => { cfg.grav = parseFloat(e.target.value); world.gravity.set(0, cfg.grav, 0); document.getElementById('v-grav').innerText = cfg.grav; });
        document.getElementById('force').addEventListener('input', (e) => { cfg.force = parseFloat(e.target.value); document.getElementById('v-force').innerText = cfg.force; });
        document.getElementById('damp').addEventListener('input', (e) => { cfg.damp = parseFloat(e.target.value); document.getElementById('v-damp').innerText = cfg.damp; });
        document.getElementById('stop').addEventListener('input', (e) => { cfg.stop = parseFloat(e.target.value); document.getElementById('v-stop').innerText = cfg.stop; });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x080808);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(15, 30, 15); light.castShadow = true;
            scene.add(light);

            world = new CANNON.World();
            world.gravity.set(0, cfg.grav, 0);

            // Chão
            const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(25, 0.5, 25)) });
            world.addBody(floorBody);
            const floorMesh = new THREE.Mesh(new THREE.BoxGeometry(50, 1, 50), new THREE.MeshPhongMaterial({color: 0x111111}));
            floorMesh.position.y = -0.5; floorMesh.receiveShadow = true;
            scene.add(floorMesh);

            // Paredes Invisíveis
            createWall(0, 5, 20, 50, 10, 1); createWall(0, 5, -20, 50, 10, 1);
            createWall(20, 5, 0, 1, 10, 50); createWall(-20, 5, 0, 1, 10, 50);

            animate();
        }

        function createWall(x, y, z, w, h, d) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)) });
            body.position.set(x, y, z); world.addBody(body);
        }

        function createLabelSprite(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = color;
            ctx.font = 'bold 80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(3.2, 3.2, 1);
            return sprite;
        }

        function rollDice(type) {
            let geometry, shape, color;
            const size = 1.6;
            const colors = { d4: '#e74c3c', d6: '#e67e22', d8: '#f1c40f', d10: '#9b59b6', d12: '#2ecc71', d20: '#3498db' };
            color = colors[type];

            switch(type) {
                case 'd4': geometry = new THREE.TetrahedronGeometry(size); shape = new CANNON.Sphere(size*0.8); break;
                case 'd6': geometry = new THREE.BoxGeometry(size, size, size); shape = new CANNON.Box(new CANNON.Vec3(size/2,size/2,size/2)); break;
                case 'd8': geometry = new THREE.OctahedronGeometry(size); shape = new CANNON.Sphere(size*0.9); break;
                case 'd10': geometry = new THREE.CylinderGeometry(0, size, size*1.3, 10); shape = new CANNON.Sphere(size); break;
                case 'd12': geometry = new THREE.DodecahedronGeometry(size); shape = new CANNON.Sphere(size); break;
                case 'd20': geometry = new THREE.IcosahedronGeometry(size, 0); shape = new CANNON.Sphere(size); break;
            }

            const mesh = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color, shininess: 80 }));
            mesh.castShadow = true; scene.add(mesh);

            const body = new CANNON.Body({ mass: 2, shape: shape, position: new CANNON.Vec3(0, 12, 0), linearDamping: 0.4, angularDamping: cfg.damp });
            
            body.velocity.set((Math.random()-0.5)*cfg.force, -30, (Math.random()-0.5)*cfg.force);
            body.angularVelocity.set((Math.random()-0.5)*45, (Math.random()-0.5)*45, (Math.random()-0.5)*45);
            
            world.addBody(body);
            dice.push({ mesh, body, type, color, rolling: true, val: 0, label: null });
            needsSum = true;
        }

        function rollAll() {
            dice.forEach(d => {
                if(d.label) { scene.remove(d.label); d.label = null; }
                d.body.position.set((Math.random()-0.5)*3, 12, (Math.random()-0.5)*3);
                d.body.velocity.set((Math.random()-0.5)*cfg.force, -30, (Math.random()-0.5)*cfg.force);
                d.body.angularVelocity.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, (Math.random()-0.5)*60);
                d.body.angularDamping = cfg.damp;
                d.rolling = true;
            });
            needsSum = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            controls.update();
            let allStopped = true;

            dice.forEach(d => {
                d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion);
                const motion = d.body.velocity.length() + d.body.angularVelocity.length();
                
                if(motion < cfg.stop && d.rolling) {
                    d.rolling = false;
                    d.body.velocity.set(0,0,0); d.body.angularVelocity.set(0,0,0);
                    d.val = Math.floor(Math.random() * parseInt(d.type.substring(1))) + 1;
                    d.label = createLabelSprite(d.val.toString(), d.color);
                    scene.add(d.label);
                } else if (motion >= cfg.stop) {
                    allStopped = false;
                    if(d.label) { scene.remove(d.label); d.label = null; }
                }
                
                if(d.label) d.label.position.set(d.mesh.position.x, d.mesh.position.y + 3, d.mesh.position.z);
            });

            if(allStopped && needsSum && dice.length > 0) { updateHistory(); needsSum = false; }
            renderer.render(scene, camera);
        }

        function updateHistory() {
            const log = document.getElementById('log');
            let formula = []; let total = 0;
            dice.forEach(d => { formula.push(`${d.type}(${d.val})`); total += d.val; });
            const entry = document.createElement('div');
            entry.className = 'sum-entry';
            entry.innerHTML = `<strong>TOTAL: ${total}</strong><span class="formula">${formula.join(' + ')}</span>`;
            log.prepend(entry);
        }

        function clearTable() {
            dice.forEach(d => { scene.remove(d.mesh); if(d.label) scene.remove(d.label); world.removeBody(d.body); });
            dice = [];
        }

        function clearLog() { document.getElementById('log').innerHTML = ''; }

        init();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
